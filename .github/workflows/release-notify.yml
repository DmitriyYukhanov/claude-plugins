name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'plugins/**'

jobs:
  release-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect updated plugins and build release notes
        id: changelog
        run: |
          # Compare HEAD with its parent to find changed plugin directories
          BEFORE="${{ github.event.before }}"

          # Handle initial push (no before SHA)
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-list --max-parents=0 HEAD)
          fi

          # Find all plugins with changed files
          changed_plugins=$(git diff --name-only "$BEFORE" HEAD -- 'plugins/' \
            | grep -oP '^plugins/\K[^/]+' \
            | sort -u)

          if [ -z "$changed_plugins" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Build combined release body
          release_body=""
          plugin_count=0
          plugin_summary=""

          while IFS= read -r plugin; do
            [ -z "$plugin" ] && continue

            # Skip plugins that were deleted in this push
            [ -d "plugins/${plugin}" ] || continue

            plugin_json="plugins/${plugin}/.claude-plugin/plugin.json"
            changelog="plugins/${plugin}/CHANGELOG.md"

            # Get version
            version="unknown"
            if [ -f "$plugin_json" ]; then
              version=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' "$plugin_json" \
                | grep -o '[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*' || echo "unknown")
            fi

            # Extract new changelog entries added since $BEFORE
            entries=""
            if [ -f "$changelog" ]; then
              old_top_version=""
              old_changelog=$(git show "${BEFORE}:${changelog}" 2>/dev/null || true)

              # If plugin was renamed, find predecessor changelog in deleted dirs
              if [ -z "$old_changelog" ]; then
                for old_plugin in $changed_plugins; do
                  if [ ! -d "plugins/${old_plugin}" ]; then
                    old_changelog=$(git show "${BEFORE}:plugins/${old_plugin}/CHANGELOG.md" 2>/dev/null || true)
                    [ -n "$old_changelog" ] && break
                  fi
                done
              fi

              if [ -n "$old_changelog" ]; then
                old_top_version=$(echo "$old_changelog" \
                  | sed -n 's/^## \[\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)\].*/\1/p' \
                  | head -1)
              fi

              # stop="" extracts all entries (new plugin); otherwise stop at old version
              entries=$(awk -v stop="$old_top_version" '
                /^## \[[0-9]/ {
                  if (match($0, /\[[0-9]+\.[0-9]+\.[0-9]+\]/)) {
                    v = substr($0, RSTART+1, RLENGTH-2)
                  } else {
                    next
                  }
                  if (stop != "" && v == stop) exit
                  if (found) print ""
                  found=1
                  print
                  next
                }
                found { print }
              ' "$changelog" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')
            fi

            # Append to release body (GitHub Markdown)
            release_body="${release_body}
          ## ${plugin}

          ${entries}
          "

            plugin_count=$((plugin_count + 1))
            if [ -n "$plugin_summary" ]; then
              plugin_summary="${plugin_summary}, ${plugin} v${version}"
            else
              plugin_summary="${plugin} v${version}"
            fi

          done <<< "$changed_plugins"

          # Set outputs
          DATE=$(date +%Y-%m-%d)
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "plugin_count=${plugin_count}" >> "$GITHUB_OUTPUT"
          echo "plugin_summary=${plugin_summary}" >> "$GITHUB_OUTPUT"

          # Use file for multiline content
          echo "$release_body" > /tmp/release_body.md

      - name: Create unique release tag
        if: steps.changelog.outputs.skip != 'true'
        id: tag
        run: |
          DATE="${{ steps.changelog.outputs.date }}"
          BASE_TAG="release-${DATE}"
          TAG="$BASE_TAG"

          # If tag exists, append incrementing suffix
          counter=2
          while git rev-parse "$TAG" &>/dev/null; do
            TAG="${BASE_TAG}-${counter}"
            counter=$((counter + 1))
          done

          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.changelog.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Plugin Updates — ${{ steps.changelog.outputs.date }}"
          body_path: /tmp/release_body.md
